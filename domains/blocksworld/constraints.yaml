mutex:
  # An object can only be on one thing
  - ["on(x,y)", "on(x,z)"] # if y != z
  # An object cannot be on the table and on another object
  - ["on_table(x)", "on(x,y)"]
  # If an object is held, it cannot be on anything
  - ["holding(x)", "on_table(x)"]
  - ["holding(x)", "on(x,y)"]
  # Arm can only hold one thing
  - ["holding(x)", "holding(y)"] # if x != y
  # Arm is either empty or holding something
  - ["holding(x)", "arm_empty()"]

at_least_one:
  # Combined with the mutex rules above, this enforces a complete hand state:
  # either the arm is empty, or exactly one block is being held.
  - ["arm_empty()", "holding(x)"]

implications:
  # If x is on y, y is not clear
  - if: "on(x,y)"
    then: "not clear(y)"
  # If arm is holding x, x is not clear
  - if: "holding(x)"
    then: "not clear(x)"
  - if: "holding(x)"
    then: "visible(x)"
